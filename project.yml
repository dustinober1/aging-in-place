name: AgingInPlace
options:
  bundleIdPrefix: com.agingInPlace
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"

targets:
  AgingInPlace:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: AgingInPlace
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agingInPlace.app
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_FILE: AgingInPlace/Info.plist
    info:
      path: AgingInPlace/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        CFBundleName: AgingInPlace
        CFBundleDisplayName: AgingInPlace
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"

  AgingInPlaceTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: AgingInPlaceTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agingInPlace.tests
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        INFOPLIST_FILE: AgingInPlaceTests/Info.plist
    info:
      path: AgingInPlaceTests/Info.plist
      properties:
        CFBundleName: AgingInPlaceTests
        CFBundleVersion: "1"
    dependencies:
      - target: AgingInPlace
